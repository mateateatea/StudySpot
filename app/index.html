<!DOCTYPE html>
<html>
<head>
    <title>StudySpot Reservation</title>
    <style>
        body { font-family: Arial; padding: 50px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        #message { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Reserve a Place at StudySpot</h2>
    
    <div class="form-group">
        <label>Select Place:</label>
        <select id="placeId">
            <option value="1">Desk for group work A</option>
            <option value="2">Desk for group work B</option>
            <option value="3">Soundproof cabin A</option>
            <option value="4">Soundproof cabin B</option>
        </select>
    </div>

    <div class="form-group">
        <label>Date (YYYY-MM-DD):</label>
        <input type="date" id="date" value="2026-07-20">
    </div>

    <div class="form-group">
        <label>Time (HH:MM):</label>
        <input type="time" id="timeSlot" value="10:00">
    </div>

    <button id="reserveBtn" onclick="makeReservation()">Reserve</button>

    <div id="message"></div>

    <script>
        async function makeReservation() {
            const placeId = document.getElementById('placeId').value;
            const payload = {
                date: document.getElementById('date').value,
                time_slot: document.getElementById('timeSlot').value
            };

            const response = await fetch(`/reserve/${placeId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            const messageBox = document.getElementById('message');
            
            if (response.ok) {
                messageBox.style.color = "green";
                messageBox.innerText = data.message;
            } else {
                messageBox.style.color = "red";
                messageBox.innerText = "Error: " + data.detail;
            }
        }
    </script>
</body>
</html>
