name: API Tests

# This tells GitHub WHEN to run the job
on:
  push:
    branches: [ "main", "master" ]

# This tells GitHub WHAT to do
jobs:
  run-tests:
    runs-on: ubuntu-latest # GitHub gives you a free, temporary Linux server

    steps:
    # 1. Download your code from the repository onto the temporary server
    - name: Get the code
      uses: actions/checkout@v4

    # 2. Install Python on that temporary server
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install FastAPI, Pytest, and anything else in your requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run the exact same Pytest command you've been running locally
    - name: Run Pytest
      run: pytest -v